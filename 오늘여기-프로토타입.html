<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘여기 - Interactive Prototype</title>
<style>
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes celebrate{0%{transform:scale(.5);opacity:0}50%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#050a15;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;}
button{cursor:pointer;font-family:inherit;border:none;}

/* Layout */
.top-bar{width:100%;padding:12px 16px;text-align:center;border-bottom:1px solid #1e293b;position:sticky;top:0;background:#050a15;z-index:50;}
.top-bar h1{font-size:18px;font-weight:900;}.top-bar h1 em{color:#ff3b5c;font-style:normal;}
.top-bar p{color:#64748b;font-size:10px;margin-top:2px;}
.breadcrumb{display:flex;gap:4px;justify-content:center;margin-top:6px;flex-wrap:wrap;}
.crumb{font-size:9px;color:#334155;cursor:pointer;padding:2px 6px;border-radius:4px;}
.crumb:hover{color:#4a9eff;background:#4a9eff10;}
.crumb.active{color:#4a9eff;font-weight:700;}
.crumb-sep{color:#1e293b;font-size:9px;}

.container{display:flex;gap:20px;padding:20px;align-items:flex-start;flex-wrap:wrap;justify-content:center;}

/* Minimap */
.minimap{position:fixed;top:80px;left:12px;width:140px;background:#0a0f1e;border:1px solid #1e293b;border-radius:12px;padding:8px;z-index:40;max-height:calc(100vh - 100px);overflow-y:auto;}
.minimap::-webkit-scrollbar{width:2px;}.minimap::-webkit-scrollbar-thumb{background:#1e293b;}
.minimap-title{font-size:8px;color:#334155;font-weight:700;margin-bottom:4px;text-transform:uppercase;}
.minimap-item{font-size:9px;color:#64748b;padding:3px 6px;border-radius:4px;cursor:pointer;display:flex;align-items:center;gap:4px;margin-bottom:1px;}
.minimap-item:hover{background:#111827;color:#94a3b8;}
.minimap-item.active{background:#4a9eff15;color:#4a9eff;font-weight:600;}
.minimap-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.minimap-section{margin-top:6px;}

/* Phone frame */
.phone-frame{width:320px;flex-shrink:0;animation:fadeIn .3s ease;}
.phone-title{font-size:10px;color:#64748b;margin-bottom:4px;display:flex;align-items:center;gap:4px;}
.phone-title .dot{width:8px;height:8px;border-radius:50%;}
.phone{width:320px;height:620px;border-radius:32px;border:2px solid #1e293b;background:#0a0f1e;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 0 40px #00000060;}

/* Status bar */
.sb{display:flex;justify-content:space-between;align-items:center;padding:8px 16px 4px;font-size:11px;font-weight:600;color:#fff;flex-shrink:0;background:#0a0f1e;}
.sb-notch{width:70px;height:16px;background:#000;border-radius:0 0 12px 12px;}
.sb-icons{display:flex;gap:4px;align-items:center;}
.sb-icons svg{display:block;}

/* Screen */
.screen{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;}
.screen::-webkit-scrollbar{width:3px;}.screen::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px;}

/* Nav elements */
[data-go]{cursor:pointer;transition:all .15s;}
[data-go]:hover{filter:brightness(1.2);transform:scale(1.02);}
[data-go]:active{transform:scale(.97);}

/* Shared components */
.p{padding:12px 14px;}
.nav-top{padding:10px 14px;font-size:14px;font-weight:800;border-bottom:1px solid #1e293b;flex-shrink:0;display:flex;align-items:center;gap:8px;}
.back-btn{font-size:11px;color:#64748b;padding:4px 8px;border-radius:6px;background:#11182780;}
.section-t{font-size:9px;font-weight:700;color:#475569;margin:10px 0 4px;text-transform:uppercase;letter-spacing:.3px;}
.inp{background:#111827;border:1px solid #33415560;border-radius:10px;padding:9px 12px;font-size:11px;color:#94a3b8;margin-bottom:6px;width:100%;}
.btn{width:100%;border-radius:10px;padding:11px;font-size:12px;font-weight:700;color:#fff;text-align:center;}
.btn-o{width:100%;border-radius:10px;padding:9px;font-size:11px;color:#94a3b8;text-align:center;background:transparent;border:1px solid #33415560;}
.chip-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px;}
.chip{padding:5px 10px;border-radius:16px;border:1px solid #33415560;font-size:9px;color:#64748b;}
.chip.on{border-color:#4a9eff;color:#4a9eff;background:#4a9eff10;}
.chip.sm{padding:3px 7px;font-size:8px;}
.tag{padding:3px 8px;border-radius:12px;background:#111827;font-size:8px;color:#94a3b8;border:1px solid #1e293b;}
.tag.on{border-color:#a78bfa;color:#a78bfa;background:#a78bfa10;}
.divider{text-align:center;font-size:9px;color:#334155;margin:6px 0;}

/* Tab bar */
.tab-bar{display:flex;border-top:1px solid #1e293b;flex-shrink:0;background:#0a0f1e;}
.tab-i{flex:1;text-align:center;padding:8px 0 6px;font-size:14px;color:#334155;}
.tab-i span{font-size:8px;display:block;margin-top:1px;}
.tab-i.on{color:#4a9eff;}

/* Chat item */
.chat-row{display:flex;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid #0f172a;}
.ava{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;}
.ava.sm{width:30px;height:30px;font-size:11px;}
.chat-body{flex:1;min-width:0;}
.chat-nm{font-size:11px;font-weight:700;}
.chat-preview{font-size:9px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-time{font-size:8px;color:#475569;text-align:right;flex-shrink:0;}
.unread-dot{width:18px;height:18px;border-radius:50%;background:#ff3b5c;color:#fff;font-size:7px;display:flex;align-items:center;justify-content:center;margin-top:3px;margin-left:auto;}
.gps-ok{font-size:7px;padding:1px 5px;border-radius:3px;background:#22c55e20;color:#22c55e;}
.gps-wait{font-size:7px;padding:1px 5px;border-radius:3px;background:#fbbf2420;color:#fbbf24;}

/* Stats */
.stat-row{display:flex;gap:6px;margin-bottom:10px;}
.stat-box{flex:1;background:#111827;border-radius:10px;padding:8px;text-align:center;}
.stat-n{font-size:13px;font-weight:800;}
.stat-l{font-size:7px;color:#64748b;margin-top:2px;}

/* Menu items */
.menu-row{padding:10px 0;border-bottom:1px solid #0f172a;font-size:11px;color:#94a3b8;display:flex;justify-content:space-between;align-items:center;}
.menu-row::after{content:'›';color:#334155;font-size:14px;}

/* Game card */
.g-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.g-card{background:#111827;border:1px solid #22c55e25;border-radius:10px;padding:10px;text-align:center;}
.g-card:hover{border-color:#22c55e60;}
.g-icon{font-size:22px;}
.g-name{font-size:10px;font-weight:700;margin-top:3px;}
.g-desc{font-size:7px;color:#64748b;margin-top:1px;}

/* Messages */
.msg{display:flex;flex-direction:column;margin-bottom:6px;}
.msg.r{align-items:flex-end;}
.bubble{max-width:78%;padding:7px 11px;border-radius:12px;font-size:10px;line-height:1.4;}
.bubble.l{background:#111827;border-radius:12px 12px 12px 3px;}
.bubble.r{background:#4a9eff;color:#fff;border-radius:12px 12px 3px 12px;}
.msg-t{font-size:7px;color:#475569;margin-top:1px;}

/* Shop item */
.shop-row{background:#111827;border:1px solid #1e293b;border-radius:10px;padding:10px;margin-bottom:6px;}
.shop-row b{font-size:10px;}
.shop-desc{font-size:8px;color:#64748b;margin-top:1px;}
.shop-p{font-size:9px;color:#f472b6;font-weight:700;margin-top:3px;}

/* Rank */
.rank-row{display:flex;align-items:center;gap:8px;padding:7px 8px;border-bottom:1px solid #0f172a;font-size:11px;}
.rank-row.me{background:#4a9eff10;border-radius:6px;}
.rank-n{font-weight:900;font-size:15px;width:22px;text-align:center;}
.rank-name{flex:1;font-weight:600;}
.rank-score{color:#fbbf24;font-weight:700;}

/* Noti */
.noti-row{display:flex;gap:8px;align-items:flex-start;padding:9px 0;border-bottom:1px solid #0f172a;}
.noti-ico{font-size:16px;flex-shrink:0;}
.noti-body{flex:1;}
.noti-title{font-size:10px;font-weight:700;}
.noti-desc{font-size:8px;color:#64748b;}
.noti-time{font-size:8px;color:#475569;flex-shrink:0;}

/* Toggle */
.setting-r{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #0f172a;font-size:11px;}
.tgl{width:34px;height:20px;border-radius:10px;background:#334155;position:relative;}
.tgl::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#64748b;}
.tgl.on{background:#4a9eff30;}.tgl.on::after{left:17px;background:#4a9eff;}

/* Badge */
.bdg{padding:3px 7px;border-radius:6px;background:#fbbf2415;border:1px solid #fbbf2430;font-size:8px;color:#fbbf24;}
.bdg.dim{opacity:.3;}

/* Time step */
.timeline{display:flex;gap:2px;margin:10px 0;}
.ts{flex:1;text-align:center;position:relative;}
.ts::before{content:'';position:absolute;top:5px;left:0;right:0;height:2px;background:#334155;}
.ts.on::before{background:#f472b6;}
.ts-dot{width:12px;height:12px;border-radius:50%;background:#334155;margin:0 auto 4px;position:relative;z-index:1;}
.ts.on .ts-dot{background:#f472b6;}
.ts-h{font-size:9px;font-weight:700;}
.ts-d{font-size:7px;color:#64748b;margin-top:2px;line-height:1.3;}

/* Flow hint */
.flow-hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#111827;border:1px solid #1e293b;border-radius:10px;padding:6px 14px;font-size:9px;color:#64748b;z-index:50;pointer-events:none;transition:opacity .3s;}

/* Responsive */
@media(max-width:600px){
  .minimap{display:none;}
  .phone{width:100%;height:calc(100vh - 80px);border-radius:0;border:none;}
  .phone-frame{width:100%;}
  .container{padding:0;}
  .top-bar{padding:8px;}
}
</style>
</head>

// ═══════════════════════════════
// Navigation engine
// ═══════════════════════════════
const history = [];
let currentScreen = 'splash';

function go(id) {
  if (!screens[id]) return;
  history.push(currentScreen);
  currentScreen = id;
  render();
}

function goBack() {
  if (history.length > 0) {
    currentScreen = history.pop();
    render();
  }
}

function render() {
  const s = screens[currentScreen];
  const phone = document.getElementById('phone');

  // Status bar
  const sbHTML = `<div class="sb"><span>9:41</span><div class="sb-notch"></div><span class="sb-icons"><svg width="16" height="10" viewBox="0 0 16 10"><rect x="0" y="3" width="3" height="7" rx=".5" fill="#fff" opacity=".4"/><rect x="4" y="2" width="3" height="8" rx=".5" fill="#fff" opacity=".6"/><rect x="8" y="1" width="3" height="9" rx=".5" fill="#fff" opacity=".8"/><rect x="12" y="0" width="3" height="10" rx=".5" fill="#fff"/></svg><svg width="22" height="10" viewBox="0 0 22 10"><rect x="0" y="0" width="18" height="10" rx="2" stroke="#fff" stroke-width="1" fill="none"/><rect x="2" y="2" width="12" height="6" rx="1" fill="#34d399"/><rect x="19" y="3" width="2" height="4" rx=".5" fill="#fff" opacity=".5"/></svg></span></div>`;

  phone.innerHTML = sbHTML + `<div class="screen" style="border-top:2px solid ${s.color}30;">${s.html}</div>`;
  phone.style.borderColor = s.color + '40';

  // Bind click events
  phone.querySelectorAll('[data-go]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      go(el.dataset.go);
    });
  });

  // Update breadcrumb
  updateBreadcrumb();
  updateMinimap();

  // Scroll to top
  phone.querySelector('.screen').scrollTop = 0;

  // Hide hint after first navigation
  if (history.length > 0) {
    document.getElementById('hint').style.opacity = '0';
  }
}

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  const trail = [...history.slice(-4), currentScreen];
  bc.innerHTML = trail.map((id, i) => {
    const s = screens[id];
    const isLast = i === trail.length - 1;
    const sep = i < trail.length - 1 ? '<span class="crumb-sep">→</span>' : '';
    return `<span class="crumb${isLast ? ' active' : ''}" onclick="${isLast ? '' : `history.splice(${history.length - (trail.length-1-i)});currentScreen='${id}';render();`}">${s.title}</span>${sep}`;
  }).join('');
}

function updateMinimap() {
  const mm = document.getElementById('minimap');
  const groups = {};
  const groupColors = {'진입':'#a78bfa','메인':'#4a9eff','홈 기능':'#fbbf24','매칭':'#ff3b5c','게임':'#22c55e','채팅':'#4a9eff','만남':'#22c55e','프로필':'#64748b'};

  Object.entries(screens).forEach(([id, s]) => {
    if (!groups[s.group]) groups[s.group] = [];
    groups[s.group].push({id, ...s});
  });

  mm.innerHTML = Object.entries(groups).map(([group, items]) => `
    <div class="minimap-section">
      <div class="minimap-title" style="color:${groupColors[group]||'#64748b'};">${group}</div>
      ${items.map(item => `<div class="minimap-item${item.id===currentScreen?' active':''}" onclick="go('${item.id}')"><div class="minimap-dot" style="background:${item.color};"></div>${item.title}</div>`).join('')}
    </div>
  `).join('');
}

// Initial render
render();
</script>
